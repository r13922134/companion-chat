<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Realtime PHQ-8 分析</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f5f7;
      --card: #ffffff;
      --card-soft: #fafafa;
      --text: #121318;
      --muted: #838893;
      --line: #e7e8ed;
      --blue: #2f6fed;
      --blue-soft: #edf3ff;
      --green: #188659;
      --green-soft: #eaf7f1;
      --orange: #c56a16;
      --orange-soft: #fff1df;
      --red: #c93452;
      --red-soft: #fff0f3;
      --shadow: 0 18px 45px rgba(22, 25, 31, 0.10);
      --soft-shadow: 0 8px 24px rgba(22, 25, 31, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      color: inherit;
    }

    .page {
      min-height: 100dvh;
      padding: 26px 18px 34px;
    }

    .shell {
      width: min(860px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 2px 2px 0;
    }

    .eyebrow {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      margin-bottom: 5px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.04;
      letter-spacing: 0;
    }

    .top-meta {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .refresh-btn {
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--soft-shadow);
      cursor: pointer;
      font-size: 19px;
      line-height: 1;
    }

    .refresh-btn:hover {
      transform: translateY(-1px);
    }

    .metric-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 11px;
    }

    .metric {
      min-height: 104px;
      border: 1px solid rgba(231, 232, 237, 0.92);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--soft-shadow);
      padding: 15px;
      display: grid;
      align-content: space-between;
      gap: 10px;
    }

    .metric small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .metric strong {
      font-size: 32px;
      line-height: 1;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(210px, 1fr) minmax(160px, 210px) minmax(150px, 190px);
      gap: 9px;
      padding: 9px;
      border: 1px solid rgba(231, 232, 237, 0.9);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 8px 26px rgba(22, 25, 31, 0.04);
    }

    .control {
      min-width: 0;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      color: var(--text);
      padding: 0 13px;
      outline: none;
    }

    .control:focus {
      border-color: rgba(47, 111, 237, 0.5);
      box-shadow: 0 0 0 3px rgba(47, 111, 237, 0.1);
    }

    .board-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 2px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .board-head strong {
      color: var(--text);
      font-size: 15px;
    }

    .history-grid {
      columns: 220px 3;
      column-gap: 14px;
    }

    .upload-card {
      width: 100%;
      display: inline-block;
      break-inside: avoid;
      margin: 0 0 14px;
      border: 1px solid rgba(231, 232, 237, 0.92);
      border-radius: 26px;
      background: var(--card);
      box-shadow: var(--shadow);
      text-align: left;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .upload-card:hover,
    .upload-card:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 22px 52px rgba(22, 25, 31, 0.14);
      outline: none;
    }

    .upload-card.error {
      background: #fffafb;
    }

    .upload-card.risk {
      background: #fff9f1;
    }

    .upload-card.ok {
      background: #fbfffd;
    }

    .card-body {
      min-height: 168px;
      display: grid;
      align-content: space-between;
      gap: 16px;
      padding: 17px;
    }

    .card-kicker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #9aa1ad;
      box-shadow: 0 0 0 4px rgba(154, 161, 173, 0.12);
    }

    .status-dot.ok {
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(24, 134, 89, 0.12);
    }

    .status-dot.running,
    .status-dot.queued {
      background: var(--orange);
      box-shadow: 0 0 0 4px rgba(197, 106, 22, 0.13);
    }

    .status-dot.error {
      background: var(--red);
      box-shadow: 0 0 0 4px rgba(201, 52, 82, 0.12);
    }

    .card-title {
      margin: 0;
      font-size: 21px;
      line-height: 1.05;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .card-subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .card-scoreline {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }

    .score-mini {
      min-width: 0;
      border-radius: 16px;
      background: rgba(245, 246, 248, 0.9);
      padding: 8px;
    }

    .score-mini small {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .score-mini strong {
      display: block;
      font-size: 17px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
    }

    .empty {
      width: 100%;
      padding: 30px 16px;
      border: 1px dashed #d6d9e1;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      text-align: center;
    }

    .loading {
      min-height: 170px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
    }

    .loading-mark {
      width: 42px;
      height: 42px;
      margin: 0 auto 12px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(47, 111, 237, 0.12), rgba(24, 134, 89, 0.12));
      position: relative;
      overflow: hidden;
    }

    .loading-mark::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.82), transparent);
      animation: sweep 1.2s ease-in-out infinite;
    }

    .detail-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      padding: 22px;
      background: rgba(245, 245, 247, 0.82);
      backdrop-filter: blur(18px);
      overflow: auto;
    }

    .detail-overlay.open {
      display: grid;
      place-items: start center;
    }

    .detail-sheet {
      width: min(760px, 100%);
      border: 1px solid rgba(231, 232, 237, 0.94);
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 28px 70px rgba(22, 25, 31, 0.18);
      overflow: hidden;
    }

    .detail-close {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 54px;
      height: 54px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      background: rgba(25, 27, 33, 0.88);
      color: #fff;
      box-shadow: 0 18px 40px rgba(22, 25, 31, 0.25);
      cursor: pointer;
      font-size: 28px;
      line-height: 1;
    }

    .detail-content {
      display: grid;
      gap: 18px;
      padding: 22px;
    }

    .detail-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .detail-time {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 7px;
      font-variant-numeric: tabular-nums;
    }

    .detail-title {
      margin: 0;
      font-size: 30px;
      line-height: 1.04;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .detail-meta {
      margin-top: 9px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .status-pill {
      flex: 0 0 auto;
      min-width: 78px;
      border-radius: 999px;
      padding: 8px 11px;
      background: #eef0f4;
      color: #555d6a;
      text-align: center;
      font-size: 12px;
      font-weight: 850;
    }

    .status-pill.ok {
      background: var(--green-soft);
      color: var(--green);
    }

    .status-pill.queued,
    .status-pill.running {
      background: var(--orange-soft);
      color: var(--orange);
    }

    .status-pill.error {
      background: var(--red-soft);
      color: var(--red);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
    }

    .summary-cell {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card-soft);
      padding: 11px;
    }

    .summary-cell small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      margin-bottom: 6px;
    }

    .summary-cell strong {
      display: block;
      font-size: 19px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 15px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .detail-section {
      min-width: 0;
    }

    .score-list,
    .phq-list,
    .info-list {
      display: grid;
      gap: 8px;
    }

    .score-row,
    .phq-row,
    .info-row {
      display: grid;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      padding: 11px;
    }

    .score-row {
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .phq-row {
      grid-template-columns: minmax(0, 1fr) minmax(130px, 0.5fr) 46px;
    }

    .info-row {
      grid-template-columns: 130px minmax(0, 1fr);
    }

    .row-main {
      min-width: 0;
    }

    .row-main strong {
      display: block;
      font-size: 13px;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .row-main span,
    .phq-answer,
    .info-value {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .chip-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }

    .score-chip {
      min-width: 52px;
      border-radius: 999px;
      padding: 6px 8px;
      text-align: center;
      font-size: 12px;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .score-chip.pred {
      background: var(--blue-soft);
      color: #1f56c4;
    }

    .score-chip.gt {
      background: var(--green-soft);
      color: var(--green);
    }

    .score-chip.err {
      background: var(--red-soft);
      color: var(--red);
    }

    .score-chip.missing {
      background: #eef0f4;
      color: #6d7480;
    }

    @keyframes sweep {
      from { transform: translateX(-120%); }
      to { transform: translateX(120%); }
    }

    @media (max-width: 760px) {
      .page {
        padding: 16px 12px 28px;
      }

      .topbar {
        align-items: flex-start;
      }

      .toolbar,
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .history-grid {
        columns: 160px 2;
      }

      .metric {
        min-height: 82px;
        border-radius: 20px;
        padding: 12px;
      }

      .metric strong {
        font-size: 24px;
      }

      .metric span {
        font-size: 11px;
      }

      .card-body {
        min-height: 154px;
        padding: 14px;
      }

      .card-title {
        font-size: 18px;
      }

      .score-mini {
        border-radius: 14px;
        padding: 7px 6px;
      }

      .score-mini strong {
        font-size: 15px;
      }

      .detail-overlay {
        padding: 12px;
      }

      .detail-content {
        padding: 17px;
      }

      .detail-head {
        flex-direction: column;
      }

      .phq-row,
      .score-row,
      .info-row {
        grid-template-columns: 1fr;
      }

      .chip-row {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="shell">
      <header class="topbar">
        <div>
          <span class="eyebrow">PHQ-8 HISTORY</span>
          <h1>Realtime 分析</h1>
          <p class="top-meta" id="sourceChip">讀取資料中</p>
        </div>
        <button class="refresh-btn" id="refreshButton" type="button" title="重新整理" aria-label="重新整理">↻</button>
      </header>

      <section class="metric-strip" id="metricStrip" aria-label="metrics"></section>

      <section class="toolbar" aria-label="filters">
        <input class="control" id="searchInput" type="search" placeholder="搜尋姓名、hash、run id">
        <select class="control" id="userSelect">
          <option value="">所有使用者</option>
        </select>
        <select class="control" id="statusSelect">
          <option value="all">所有狀態</option>
          <option value="ok">ok</option>
          <option value="queued">queued</option>
          <option value="running">running</option>
          <option value="error">error</option>
          <option value="empty">尚無狀態</option>
        </select>
      </section>

      <section>
        <div class="board-head">
          <strong>上傳資料</strong>
          <span id="resultNote">0 筆</span>
        </div>
      </section>

      <section class="history-grid" id="cardBoard" aria-label="uploaded runs"></section>
    </div>
  </main>

  <div class="detail-overlay" id="detailOverlay" aria-hidden="true">
    <section class="detail-sheet" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
      <div class="detail-content" id="detailContent"></div>
    </section>
    <button class="detail-close" id="detailClose" type="button" title="關閉" aria-label="關閉">×</button>
  </div>

  <script>
    const state = {
      data: null,
      selectedUserKey: "",
      search: "",
      status: "all",
      lastRuns: [],
    };

    const els = {
      sourceChip: document.getElementById("sourceChip"),
      refreshButton: document.getElementById("refreshButton"),
      searchInput: document.getElementById("searchInput"),
      userSelect: document.getElementById("userSelect"),
      statusSelect: document.getElementById("statusSelect"),
      metricStrip: document.getElementById("metricStrip"),
      resultNote: document.getElementById("resultNote"),
      cardBoard: document.getElementById("cardBoard"),
      detailOverlay: document.getElementById("detailOverlay"),
      detailContent: document.getElementById("detailContent"),
      detailClose: document.getElementById("detailClose"),
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatScore(value, digits = 1) {
      if (value === null || value === undefined || value === "") return "-";
      const number = Number(value);
      if (!Number.isFinite(number)) return "-";
      return number.toFixed(digits);
    }

    function formatMetric(value, digits = 3) {
      if (value === null || value === undefined || value === "") return "-";
      const number = Number(value);
      if (!Number.isFinite(number)) return "-";
      return number.toFixed(digits);
    }

    function formatDate(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value).slice(0, 19);
      return date.toLocaleString("zh-TW", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function textOrDash(value) {
      const text = String(value ?? "").trim();
      return text || "-";
    }

    function numeric(value) {
      if (value === null || value === undefined || value === "") return null;
      const number = Number(value);
      return Number.isFinite(number) ? number : null;
    }

    function mean(values) {
      const clean = values.filter((value) => Number.isFinite(value));
      if (!clean.length) return null;
      return clean.reduce((sum, value) => sum + value, 0) / clean.length;
    }

    function comparablePairs(runs) {
      const aspectPairs = runs
        .flatMap((run) => run.aspect_predictions || [])
        .map((aspect) => ({
          prediction: numeric(aspect.prediction),
          truth: numeric(aspect.ground_truth),
        }))
        .filter((pair) => pair.prediction !== null && pair.truth !== null);
      if (aspectPairs.length) {
        return { pairs: aspectPairs, unit: "個分數" };
      }

      const totalPairs = runs
        .map((run) => ({
          prediction: numeric(run.prediction),
          truth: numeric(run.ground_truth),
        }))
        .filter((pair) => pair.prediction !== null && pair.truth !== null);
      return { pairs: totalPairs, unit: "筆總分" };
    }

    function concordanceCorrelationCoefficient(pairs) {
      if (pairs.length < 2) return null;
      const predictions = pairs.map((pair) => pair.prediction);
      const truths = pairs.map((pair) => pair.truth);
      const meanPred = mean(predictions);
      const meanTruth = mean(truths);
      if (meanPred === null || meanTruth === null) return null;
      const covariance = mean(pairs.map((pair) => (pair.prediction - meanPred) * (pair.truth - meanTruth)));
      const predVariance = mean(predictions.map((value) => (value - meanPred) ** 2));
      const truthVariance = mean(truths.map((value) => (value - meanTruth) ** 2));
      const denominator = predVariance + truthVariance + (meanPred - meanTruth) ** 2;
      if (!Number.isFinite(denominator) || denominator === 0) {
        return meanPred === meanTruth ? 1 : null;
      }
      return (2 * covariance) / denominator;
    }

    function computeMetrics(runs) {
      const { pairs, unit } = comparablePairs(runs);
      const errors = pairs.map((pair) => pair.prediction - pair.truth);
      const absErrors = errors.map((error) => Math.abs(error));
      const squaredErrors = errors.map((error) => error ** 2);
      return {
        pairCount: pairs.length,
        unit,
        mae: mean(absErrors),
        ccc: concordanceCorrelationCoefficient(pairs),
        rmse: squaredErrors.length ? Math.sqrt(mean(squaredErrors)) : null,
      };
    }

    function normalizedStatus(status) {
      return String(status || "").toLowerCase();
    }

    function statusTone(run) {
      const status = normalizedStatus(run?.depression_status);
      if (status === "error") return "error";
      if (status === "queued" || status === "running") return status;
      const prediction = numeric(run?.prediction);
      if (prediction !== null && prediction >= 10) return "risk";
      if (status === "ok") return "ok";
      return "other";
    }

    function statusLabel(status) {
      return textOrDash(status);
    }

    function isStatusMatch(run) {
      const status = String(run?.depression_status || "");
      if (state.status === "all") return true;
      if (state.status === "empty") return !status;
      return status === state.status;
    }

    function matchesSearchUser(user) {
      const query = state.search.trim().toLowerCase();
      if (!query) return true;
      const haystack = [
        user.name,
        user.user_key,
        user.account_hash,
        user.session_hash,
        user.respondent_email,
        user.form_hash,
        user.age,
        user.submitted_at,
        ...(user.runs || []).map((run) => run.run_id),
        ...(user.runs || []).map((run) => run.session_hash),
      ].join(" ").toLowerCase();
      return haystack.includes(query);
    }

    function filteredUsers() {
      if (!state.data) return [];
      return (state.data.users || []).filter((user) => {
        if (state.selectedUserKey && user.user_key !== state.selectedUserKey) return false;
        if (!matchesSearchUser(user)) return false;
        if (state.status === "all") return true;
        return (user.runs || []).some(isStatusMatch);
      });
    }

    function runViewKey(user, run) {
      return [
        user.user_key || "",
        run.session_hash || "",
        run.run_id || "",
        run.uploaded_at || run.started_at || "",
      ].join("|");
    }

    function filteredRuns(users) {
      return users
        .flatMap((user) => (user.runs || []).map((run) => ({
          ...run,
          view_key: runViewKey(user, run),
          user_name: user.name,
          user_key: user.user_key,
          account_hash: user.account_hash,
          respondent_email: user.respondent_email,
          age: run.age || user.age,
          form_hash: run.form_hash || user.form_hash,
          gt_form_hash: run.gt_form_hash || run.form_hash || "",
          latest_form_hash: run.latest_form_hash || user.latest_form_hash,
          form_count: user.form_count,
          submitted_at: run.submitted_at || user.submitted_at,
          received_at: run.received_at || user.received_at,
          phq8: run.phq8 || {},
        })))
        .filter(isStatusMatch)
        .sort((a, b) => String(b.uploaded_at || b.started_at || "").localeCompare(String(a.uploaded_at || a.started_at || "")));
    }

    function populateUserSelect() {
      const current = state.selectedUserKey;
      const users = state.data?.users || [];
      els.userSelect.innerHTML = `<option value="">所有使用者</option>` + users.map((user) => `
        <option value="${escapeHtml(user.user_key)}">${escapeHtml(user.name || user.user_key)}</option>
      `).join("");
      els.userSelect.value = current;
    }

    function renderMetrics(runs) {
      const metrics = computeMetrics(runs);
      const note = `${metrics.pairCount} ${metrics.unit}可比較`;
      const items = [
        { label: "MAE", value: formatMetric(metrics.mae), sub: note },
        { label: "CCC", value: formatMetric(metrics.ccc), sub: note },
        { label: "RMSE", value: formatMetric(metrics.rmse), sub: note },
      ];
      els.metricStrip.innerHTML = items.map((item) => `
        <div class="metric">
          <small>${escapeHtml(item.label)}</small>
          <strong>${escapeHtml(item.value)}</strong>
          <span>${escapeHtml(item.sub)}</span>
        </div>
      `).join("");
    }

    function aspectRows(run) {
      const byIndex = new Map();
      (run.aspect_predictions || []).forEach((aspect) => {
        const index = Number(aspect.index);
        if (Number.isFinite(index)) byIndex.set(index, aspect);
      });
      const phqItems = run?.phq8?.items || [];
      return Array.from({ length: 8 }, (_, offset) => {
        const index = offset + 1;
        const aspect = byIndex.get(index) || {};
        const item = phqItems[index - 1] || {};
        const prediction = numeric(aspect.prediction);
        const groundTruth = numeric(aspect.ground_truth ?? item.score);
        return {
          index,
          label: aspect.label || item.question || `PHQ-8 item ${index}`,
          answer: item.answer || "",
          source: aspect.source || "",
          prediction,
          groundTruth,
          error: prediction === null || groundTruth === null ? null : Math.abs(prediction - groundTruth),
        };
      });
    }

    function renderScoreChip(value, type, label) {
      const classes = ["score-chip", type];
      if (value === null) classes.push("missing");
      const digits = type === "gt" ? 0 : 1;
      return `<span class="${classes.join(" ")}">${escapeHtml(label)} ${formatScore(value, digits)}</span>`;
    }

    function renderCard(run) {
      const tone = statusTone(run);
      const status = normalizedStatus(run.depression_status);
      const title = run.user_name || run.user_key || "未命名使用者";
      const time = formatDate(run.uploaded_at || run.started_at);
      const age = textOrDash(run.age);
      const phqTotal = run?.phq8?.total_score ?? run.ground_truth;
      return `
        <button class="upload-card ${escapeHtml(tone)}" type="button" data-run-key="${escapeHtml(run.view_key)}">
          <div class="card-body">
            <div>
              <div class="card-kicker">
                <span>${escapeHtml(time)}</span>
                <span class="status-dot ${escapeHtml(status)}"></span>
              </div>
              <h2 class="card-title">${escapeHtml(title)}</h2>
              <div class="card-subtitle">年齡 ${escapeHtml(age)} · ${escapeHtml(statusLabel(run.depression_status))}</div>
            </div>
            <div class="card-scoreline">
              <span class="score-mini"><small>PRED</small><strong>${formatScore(run.prediction)}</strong></span>
              <span class="score-mini"><small>GT</small><strong>${formatScore(phqTotal, 0)}</strong></span>
              <span class="score-mini"><small>ERR</small><strong>${formatScore(run.abs_error)}</strong></span>
            </div>
          </div>
        </button>
      `;
    }

    function renderCards(runs) {
      state.lastRuns = runs;
      els.resultNote.textContent = `${runs.length} 筆`;
      if (!runs.length) {
        els.cardBoard.innerHTML = `<div class="empty">沒有符合條件的上傳資料。</div>`;
        return;
      }
      els.cardBoard.innerHTML = runs.map(renderCard).join("");
      els.cardBoard.querySelectorAll("[data-run-key]").forEach((card) => {
        card.addEventListener("click", () => {
          const run = state.lastRuns.find((item) => item.view_key === card.dataset.runKey);
          if (run) openDetail(run);
        });
      });
    }

    function renderInfoRows(run) {
      const phq = run.phq8 || {};
      const rows = [
        ["姓名", run.user_name || run.user_key],
        ["年齡", run.age],
        ["帳號 Hash", run.account_hash || run.user_key],
        ["Email", run.respondent_email],
        ["GT 表單 Hash", run.gt_form_hash || run.form_hash],
        ["最新表單 Hash", run.latest_form_hash || run.form_hash],
        ["問卷份數", run.form_count],
        ["PHQ 總分", `${formatScore(phq.total_score ?? run.ground_truth, 0)} / ${formatScore(phq.max_score ?? 24, 0)}`],
        ["填表時間", formatDate(run.submitted_at)],
        ["接收時間", formatDate(run.received_at)],
      ];
      return rows.map(([label, value]) => `
        <div class="info-row">
          <strong>${escapeHtml(label)}</strong>
          <span class="info-value">${escapeHtml(textOrDash(value))}</span>
        </div>
      `).join("");
    }

    function renderScoreRows(run) {
      const rows = aspectRows(run);
      return rows.map((row) => `
        <div class="score-row">
          <div class="row-main">
            <strong>${row.index}. ${escapeHtml(row.label)}</strong>
            <span>${escapeHtml(row.source || "PHQ-8")}</span>
          </div>
          <div class="chip-row">
            ${renderScoreChip(row.prediction, "pred", "P")}
            ${renderScoreChip(row.groundTruth, "gt", "GT")}
            ${renderScoreChip(row.error, "err", "E")}
          </div>
        </div>
      `).join("");
    }

    function renderPhqRows(run) {
      const items = run?.phq8?.items || [];
      if (!items.length) {
        return `<div class="empty">這筆資料沒有 PHQ 問卷明細。</div>`;
      }
      return items.map((item, offset) => `
        <div class="phq-row">
          <div class="row-main">
            <strong>${offset + 1}. ${escapeHtml(item.question || `PHQ-8 item ${offset + 1}`)}</strong>
          </div>
          <span class="phq-answer">${escapeHtml(textOrDash(item.answer))}</span>
          <span class="score-chip gt">${formatScore(item.score, 0)}</span>
        </div>
      `).join("");
    }

    function openDetail(run) {
      const title = run.user_name || run.user_key || "未命名使用者";
      const status = normalizedStatus(run.depression_status);
      const phqTotal = run?.phq8?.total_score ?? run.ground_truth;
      els.detailContent.innerHTML = `
        <header class="detail-head">
          <div>
            <div class="detail-time">${escapeHtml(formatDate(run.uploaded_at || run.started_at))}</div>
            <h2 class="detail-title" id="detailTitle">${escapeHtml(title)}</h2>
            <div class="detail-meta">Run ${escapeHtml(textOrDash(run.run_id))}<br>${escapeHtml(textOrDash(run.session_hash || run.form_hash || run.user_key))}</div>
          </div>
          <span class="status-pill ${escapeHtml(status)}">${escapeHtml(statusLabel(run.depression_status))}</span>
        </header>

        <section class="summary-grid" aria-label="summary">
          <div class="summary-cell"><small>年齡</small><strong>${escapeHtml(textOrDash(run.age))}</strong></div>
          <div class="summary-cell"><small>預測總分</small><strong>${formatScore(run.prediction)}</strong></div>
          <div class="summary-cell"><small>GT 總分</small><strong>${formatScore(phqTotal, 0)}</strong></div>
          <div class="summary-cell"><small>總分誤差</small><strong>${formatScore(run.abs_error)}</strong></div>
        </section>

        <section class="detail-section">
          <h3 class="section-title">每個分數預測與 GT</h3>
          <div class="score-list">${renderScoreRows(run)}</div>
        </section>

        <section class="detail-section">
          <h3 class="section-title">PHQ 問卷資訊</h3>
          <div class="info-list">${renderInfoRows(run)}</div>
        </section>

        <section class="detail-section">
          <h3 class="section-title">PHQ 問卷逐題</h3>
          <div class="phq-list">${renderPhqRows(run)}</div>
        </section>
      `;
      els.detailOverlay.classList.add("open");
      els.detailOverlay.setAttribute("aria-hidden", "false");
      els.detailClose.focus();
    }

    function closeDetail() {
      els.detailOverlay.classList.remove("open");
      els.detailOverlay.setAttribute("aria-hidden", "true");
      els.detailContent.innerHTML = "";
    }

    function render() {
      const users = filteredUsers();
      const runs = filteredRuns(users);
      renderMetrics(runs);
      renderCards(runs);
    }

    async function loadDashboard() {
      els.metricStrip.innerHTML = `
        <div class="metric loading" style="grid-column:1/-1">
          <div><div class="loading-mark"></div>讀取 realtime analytics</div>
        </div>
      `;
      const response = await fetch("/api/realtime-analytics", { cache: "no-store" });
      const payload = await response.json();
      if (!response.ok || payload.status !== "ok") {
        throw new Error(payload.message || "analytics api failed");
      }
      state.data = payload;
      els.sourceChip.textContent = `${payload.source.realtime_run_count} runs · ${payload.source.form_count} forms · ${formatDate(payload.generated_at)}`;
      populateUserSelect();
      render();
    }

    els.refreshButton.addEventListener("click", () => {
      loadDashboard().catch((error) => {
        els.metricStrip.innerHTML = `<div class="metric loading" style="grid-column:1/-1">讀取失敗：${escapeHtml(error.message)}</div>`;
        els.cardBoard.innerHTML = "";
      });
    });

    els.searchInput.addEventListener("input", () => {
      state.search = els.searchInput.value || "";
      render();
    });

    els.userSelect.addEventListener("change", () => {
      state.selectedUserKey = els.userSelect.value || "";
      render();
    });

    els.statusSelect.addEventListener("change", () => {
      state.status = els.statusSelect.value || "all";
      render();
    });

    els.detailClose.addEventListener("click", closeDetail);
    els.detailOverlay.addEventListener("click", (event) => {
      if (event.target === els.detailOverlay) closeDetail();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && els.detailOverlay.classList.contains("open")) {
        closeDetail();
      }
    });

    loadDashboard().catch((error) => {
      els.metricStrip.innerHTML = `<div class="metric loading" style="grid-column:1/-1">讀取失敗：${escapeHtml(error.message)}</div>`;
      els.sourceChip.textContent = "讀取失敗";
    });
  </script>
</body>
</html>
