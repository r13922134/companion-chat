      els.transcriptLog.innerHTML = "";
      els.textInput.value = "";
      if (els.transcriptSidebar) els.transcriptSidebar.classList.remove("open");
      setMicrophoneButtonEnabled(false);
      setMicrophoneMuted(false);
      els.chooseAgainButton.disabled = true;
      setStatus("啟動中");
      setNotice("正在開啟麥克風、攝影機與 Realtime 連線...");

      try {
        await startMediaCapture();
        setMicrophoneButtonEnabled(true);
        startVisualizer();
        await startRealtimePeerConnection(sessionGeneration);
        if (sessionGeneration !== state.sessionGeneration) return;
        markSessionReady();
        setStatus("已連線");
        setNotice("已連線，請開始說話。");
      } catch (error) {
        setNotice(`啟動失敗：${error.message}`);
        await cleanupSession(false);
        setSessionPhase(SESSION_PHASE.ERROR);
        setMicrophoneButtonEnabled(false);
        els.chooseAgainButton.disabled = false;
        setStatus("錯誤");
      }
    }

    async function startMediaCapture() {
      const mediaConstraints = {
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
        },
        video: state.archiveVideoEnabled ? {
          facingMode: "user",
          width: { ideal: 640 },
          height: { ideal: 360 },
          frameRate: { ideal: 15, max: 30 },
        } : false,
      };
      const stream = await navigator.mediaDevices.getUserMedia(mediaConstraints);
      state.localStream = stream;
      for (const track of stream.getAudioTracks()) {
        track.contentHint = "speech";
      }
      applyMicrophoneTrackState();

      if (state.archiveVideoEnabled) {
        els.localVideo.srcObject = stream;
        resetVideoPipPosition(els.videoPip);
        els.videoPip.classList.remove("pip-hidden");
        await els.localVideo.play().catch(() => {});

        state.frameSampler = new FrameSampler(els.localVideo, (count) => {
          if (els.frameCountText) els.frameCountText.textContent = String(count);
        });
        state.frameSampler.start();
      } else {
        els.localVideo.srcObject = null;
        els.videoPip.classList.add("pip-hidden");
        if (els.frameCountText) els.frameCountText.textContent = "關閉";
      }

      if (state.archiveAudioEnabled) {
        state.userRecorder = new PcmWavRecorder(stream);
        await state.userRecorder.start();
      }
    }

    async function startRealtimePeerConnection(sessionGeneration) {
      const secretData = await fetchJson(apiPath("/api/realtime-client-secret"), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          account_id: state.sessionHash,
          session_hash: state.sessionHash,
        }),
      });
      const ephemeralKey = secretData.value || secretData.client_secret?.value || "";
      if (!ephemeralKey) {
        throw new Error("無法取得 Realtime client secret");
      }
      if (sessionGeneration !== state.sessionGeneration) return;
      state.medicalQaEnabled = Boolean(secretData.medical_qa_enabled);

      const pc = new RTCPeerConnection();
      state.pc = pc;
      state.remoteStream = new MediaStream();
      els.remoteAudio.srcObject = state.remoteStream;

      pc.ontrack = async (event) => {
        if (sessionGeneration !== state.sessionGeneration) return;
        for (const track of event.streams[0].getTracks()) {
          state.remoteStream.addTrack(track);
        }
        if (state.archiveAudioEnabled && !state.assistantRecorder) {
          state.assistantRecorder = new PcmWavRecorder(state.remoteStream);
          await state.assistantRecorder.start();
        }
      };

      if (sessionGeneration !== state.sessionGeneration || !state.localStream) return;
      const sourceAudioTrack = state.localStream.getAudioTracks()[0];
      if (sourceAudioTrack) {
        state.outboundAudioTrack = sourceAudioTrack.clone();
        state.outboundAudioTrack.contentHint = "speech";
        applyMicrophoneTrackState();
        pc.addTrack(
          state.outboundAudioTrack,
          new MediaStream([state.outboundAudioTrack])
        );
      }

      const dc = pc.createDataChannel("oai-events");
      state.dc = dc;
      dc.addEventListener("open", () => {
        if (sessionGeneration !== state.sessionGeneration) return;
        markSessionReady();
        setStatus("已連線");
      });
      dc.addEventListener("message", (event) => handleRealtimeEvent(event.data, sessionGeneration));
      dc.addEventListener("close", () => {
        if (sessionGeneration !== state.sessionGeneration) return;
        if (!state.stopping) {
          setSessionPhase(SESSION_PHASE.ERROR);
          setStatus("未連線");
        }
      });

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      const sdpResponse = await fetch("https://api.openai.com/v1/realtime/calls", {
        method: "POST",
        body: offer.sdp,
        headers: {
          "Authorization": `Bearer ${ephemeralKey}`,
          "Content-Type": "application/sdp",
        },
      });

      if (sessionGeneration !== state.sessionGeneration) return;
      if (!sdpResponse.ok) {
        const body = await sdpResponse.text();
        throw new Error(`Realtime SDP 建立失敗：${sdpResponse.status} ${body.slice(0, 180)}`);
      }

      await pc.setRemoteDescription({
        type: "answer",
        sdp: await sdpResponse.text(),
      });
    }

    function handleRealtimeEvent(rawMessage, sessionGeneration) {
      if (sessionGeneration !== state.sessionGeneration) return;
      let event;
      try {
        event = JSON.parse(rawMessage);
      } catch {
        return;
      }

      switch (event.type) {
        case "session.created":
        case "session.updated":
          markSessionReady();
          if (
            !["listening", "thinking", "assistant-speaking", "uploading", "uploaded"].includes(state.statusVisualKey)
            && !state.statusVisualKey.startsWith("tool")
            && !state.statusVisualKey.startsWith("stage-")
          ) {
            setStatus("已連線");
          }
          break;
        case "response.created":
          state.currentResponseId = event.response?.id || "";
          setAssistantAudioActive(true);
          setStatus("正在思考");
          break;
        case "input_audio_buffer.speech_started":
          const wasBargeIn = state.bargeInActive;
          state.responseRequestGeneration++;
          state.currentUserItemId = "";
          state.userTranscriptBuffer = "";
          state.currentUserSpeechStartMs = Date.now();
          if (state.currentResponseId && !wasBargeIn) {
            sendRealtimeEvent({ type: "response.cancel", response_id: state.currentResponseId });
          }
          state.currentResponseId = "";
          if (wasBargeIn) {
            setAssistantAudioActive(false, { immediate: true });
          }
          setStatus("使用者說話中");
          break;
        case "input_audio_buffer.speech_stopped":
          finalizeCurrentUserSpeechInterval();
          setStatus("正在思考");
          break;
        case "conversation.item.input_audio_transcription.segment":
          appendUserTranscript(event.item_id || "", event.text || "");
          break;
        case "conversation.item.input_audio_transcription.completed":
          completeUserTranscript(event.item_id || "", event.transcript || "");
          break;
        case "response.audio.delta":
        case "response.output_audio.delta":
          setAssistantAudioActive(true);
          setStatus("助理回覆中");
          break;
        case "response.audio_transcript.delta":
        case "response.output_audio_transcript.delta":
          setAssistantAudioActive(true);
          setStatus("助理回覆中");
          appendAssistantTranscript(event.item_id || "", event.delta || "");
          break;
        case "response.output_text.delta":
          appendAssistantTranscript(event.item_id || "", event.delta || "");
          break;
        case "response.audio.done":
        case "response.output_audio.done":
          scheduleAssistantAudioRelease();
          break;
        case "response.audio_transcript.done":
        case "response.output_audio_transcript.done":
          completeAssistantTranscript(event.item_id || "", event.transcript || "");
          break;
        case "response.output_text.done":
          completeAssistantTranscript(event.item_id || "", event.text || "");
          break;
        case "response.done":
          if (
            event.response?.id
            && (!state.currentResponseId || event.response.id !== state.currentResponseId)
          ) {
            break;
          }
          if (!handleFunctionCalls(event.response)) {
            state.currentResponseId = "";
            scheduleAssistantAudioRelease();
            scheduleListeningStatus();
          }
          break;
        case "error":
          scheduleAssistantAudioRelease();
          setNotice(`Realtime 錯誤：${event.error?.message || "unknown error"}`);
          break;
        default:
          break;
      }
    }

    function appendUserTranscript(itemId, text) {
      if (!text) return;
      if (state.currentUserItemId !== itemId) {
        state.currentUserItemId = itemId;
        state.userTranscriptBuffer = "";
      }
      state.userTranscriptBuffer += text;
    }

    async function completeUserTranscript(itemId, transcript) {
      const rawText = (transcript || state.userTranscriptBuffer || "").trim();
      state.currentUserItemId = itemId;
      state.userTranscriptBuffer = rawText;
      if (!rawText) return;
      const text = await convertTranscriptToTraditional(rawText);
      state.userTranscriptBuffer = text;
      if (!text) return;
      const transcriptItem = recordTranscript("user", itemId, text);
      if (!transcriptItem) return;
      appendRecentMessage("user", text);
      state.currentMemoryContext = "";
      state.currentMemoryResolved = false;
      state.currentMemoryStatus = "";
      requestAssistantAfterUserTranscript();
    }

    function createTextItemId() {
      return `text-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 10)}`;
    }

    async function handleTextInputSubmit(event) {
      event.preventDefault();
      const rawText = (els.textInput.value || "").trim();
      if (
        !rawText
        || !state.sessionReady
        || state.stopping
        || state.restartReady
        || !state.dc
        || state.dc.readyState !== "open"
      ) {
        return;
      }

      els.textInput.value = "";
      setTextInputEnabled(false);
      try {
        const text = await convertTranscriptToTraditional(rawText);
        if (!text) return;
        const itemId = createTextItemId();
        if (state.currentResponseId) {
          sendRealtimeEvent({ type: "response.cancel", response_id: state.currentResponseId });
        }
        sendRealtimeEvent({
          type: "conversation.item.create",
          item: {
            type: "message",
            role: "user",
            content: [
              {
                type: "input_text",
                text,
              },
            ],
          },
        });
        const transcriptItem = recordTranscript("user", itemId, text, { attachAudioInterval: false });
        if (!transcriptItem) return;
        appendRecentMessage("user", text);
        state.currentMemoryContext = "";
        state.currentMemoryResolved = false;
        state.currentMemoryStatus = "";
        requestAssistantAfterUserTranscript();
      } finally {
        setTextInputEnabled(state.sessionPhase === SESSION_PHASE.LIVE && state.dc?.readyState === "open");
        if (state.sessionPhase === SESSION_PHASE.LIVE && !state.stopping) {
          els.textInput.focus();
        }
      }
    }

    function secondsSinceSessionStart(timestampMs) {
      if (!timestampMs || !state.startedAtMs) return 0;
      return Math.max(0, (timestampMs - state.startedAtMs) / 1000);
    }

    function finalizeCurrentUserSpeechInterval() {
      if (!state.currentUserSpeechStartMs) return null;
      const startMs = state.currentUserSpeechStartMs;
      const endMs = Math.max(startMs + 1, Date.now());
      state.currentUserSpeechStartMs = 0;
      const interval = {
        start_ms: startMs,
        end_ms: endMs,
        audio_start_seconds: secondsSinceSessionStart(startMs),
        audio_end_seconds: secondsSinceSessionStart(endMs),
      };
      state.pendingUserSpeechIntervals.push(interval);
      state.userSpeechIntervals.push(interval);
      return interval;
    }

    function appendAssistantTranscript(itemId, text) {
      if (!text) return;
      if (state.currentAssistantItemId !== itemId) {
        state.currentAssistantItemId = itemId;
        state.assistantTranscriptBuffer = "";
      }
      state.assistantTranscriptBuffer += text;
    }

    async function completeAssistantTranscript(itemId, transcript) {
      const rawText = (transcript || state.assistantTranscriptBuffer || "").trim();
      state.currentAssistantItemId = itemId;
      state.assistantTranscriptBuffer = rawText;
      if (!rawText) return;
      const text = await convertTranscriptToTraditional(rawText);
      state.assistantTranscriptBuffer = text;
      if (!text) return;
      const transcriptItem = recordTranscript("assistant", itemId, text);
      if (!transcriptItem) return;
      appendRecentMessage("assistant", text);
    }

    function recordTranscript(speaker, itemId, text, options = {}) {
      const normalizedText = (text || "").trim();
      if (!normalizedText) return;
      const key = itemId
        ? `${speaker}:item:${itemId}`
        : `${speaker}:text:${normalizedText}`;
      if (state.transcriptDedupe.has(key)) return null;
      state.transcriptDedupe.add(key);

      const item = {
        speaker,
        item_id: itemId || null,
        text: normalizedText,
        timestamp_ms: Date.now(),
      };
      if (speaker === "user" && options.attachAudioInterval !== false) {
        const interval = state.pendingUserSpeechIntervals.shift()
          || finalizeCurrentUserSpeechInterval();
        if (interval) {
          item.start_ms = interval.start_ms;
          item.end_ms = interval.end_ms;
          item.audio_start_seconds = interval.audio_start_seconds;
          item.audio_end_seconds = interval.audio_end_seconds;
        }
      }
      state.transcriptEvents.push(item);
      state.transcriptLines.push(`${speaker === "user" ? "USER" : "ASSISTANT"}: ${normalizedText}`);
      addTranscriptLine(speaker, normalizedText);
      return item;
    }

    function addTranscriptLine(speaker, text) {
      const row = document.createElement("div");
      row.className = `line ${speaker}`;
      const textEl = document.createElement("div");
      textEl.className = "line-text";
      textEl.textContent = text;
      row.appendChild(textEl);
      els.transcriptLog.appendChild(row);
      scrollConversationToLatest();
    }

    function toolStatusLabel(name) {
      if (name === "mood_assessment") return "情緒問答";
      if (name === "medical_qa") return "醫療問答";
      if (name === "search_web") return "網路搜尋";
      return name || "工具";
    }

    function toolStatusVariant(name) {
      if (name === "mood_assessment") return "tool-phq";
      if (name === "medical_qa") return "tool-medical";
      if (name === "search_web") return "tool-web";
      return "tool";
    }

    async function convertTranscriptToTraditional(text) {
      const rawText = (text || "").trim();
      if (!rawText) return "";
      try {
        const data = await fetchJson(apiPath("/api/convert-traditional"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: rawText }),
        });
        return (data.text || rawText).trim();
      } catch (error) {
        setNotice(`繁體轉換失敗，使用原始轉錄：${error.message}`);
        return rawText;
      }
    }


    function appendRecentMessage(role, text) {
      state.recentMessages.push({ role, text });
      while (state.recentMessages.length > RECENT_CONTEXT_MESSAGE_LIMIT) {
        state.recentMessages.shift();
      }
    }

    async function requestAssistantAfterUserTranscript() {
      const requestId = ++state.responseRequestGeneration;
      setStatus("正在思考");
      const memoryPromise = requestCurrentMemory(requestId);
      await memoryPromise;
      if (requestId !== state.responseRequestGeneration || state.stopping) return;
      await requestAssistantResponse("default", "auto");
    }

    async function requestCurrentMemory(requestId) {
      if (state.currentMemoryResolved) {
        return {
          memory_context: state.currentMemoryContext,
          memory_status: state.currentMemoryStatus,
        };
      }
      try {
        const data = await fetchJson(apiPath("/api/realtime-memory-recall"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            account_id: state.sessionHash,
            session_hash: state.sessionHash,
            user_transcript: getLatestUserTranscript(),
          }),
        });
        if (requestId !== state.responseRequestGeneration || state.stopping) return null;
        state.currentMemoryContext = data.memory_context || "";
        state.currentMemoryStatus = data.memory_status || "";
        state.currentMemoryResolved = true;
        return data;
      } catch (error) {
        if (requestId !== state.responseRequestGeneration || state.stopping) return null;
        state.currentMemoryContext = "";
        state.currentMemoryStatus = "error";
        state.currentMemoryResolved = true;
        setNotice(`記憶搜尋失敗，本輪繼續回應：${error.message}`);
        return {
          memory_context: "",
          memory_status: "error",
          memory_error: error.message,
        };
      }
    }

    async function requestAssistantResponse(kind, toolChoice, toolOutput = "") {
      if (!state.dc || state.dc.readyState !== "open" || state.stopping) return;
      const requestId = state.responseRequestGeneration;
      const latestUserTranscript = getLatestUserTranscript();
      const resolvedToolChoice = toolChoice;
      const data = await fetchJson(apiPath("/api/realtime-response-instructions"), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          kind,
          user_transcript: latestUserTranscript,
          account_id: state.sessionHash,
          session_hash: state.sessionHash,
          memory_context: state.currentMemoryContext,
          memory_status: state.currentMemoryStatus,
          recall_memory: !state.currentMemoryResolved,
          tool_output: toolOutput,
          mood_aspect_state: state.moodAspectState,
        }),
      });
      if (requestId !== state.responseRequestGeneration || state.stopping) return;
      state.currentMemoryContext = data.memory_context || "";
      state.currentMemoryStatus = data.memory_status || "";
      state.currentMemoryResolved = true;
      state.moodAspectState = normalizeMoodAspectState(data.mood_aspect_state || state.moodAspectState);
      const assistantInstructions = data.instructions || "";
      console.log("[REALTIME OPENAI PROMPT]", {
        kind,
        tool_choice: resolvedToolChoice,
        prompt: assistantInstructions,
      });
      sendRealtimeEvent({
        type: "response.create",
        response: {
          instructions: assistantInstructions,
          tool_choice: resolvedToolChoice,
          output_modalities: ["audio"],
        },
      });
      setStatus("正在思考");
    }

    function handleFunctionCalls(response) {
      const output = Array.isArray(response?.output) ? response.output : [];
      const calls = output.filter((item) => item?.type === "function_call");
      if (!calls.length) return false;
      for (const call of calls) {
        handleFunctionCall(call);
      }
      return true;
    }

    async function handleFunctionCall(call) {
      const callId = call.call_id || "";
      const name = call.name || "";
      const args = parseJsonObject(call.arguments || "{}");
      if (!callId) return;
      setStatus(`工具選擇：${toolStatusLabel(name)}`, {
        variant: toolStatusVariant(name),
        force: true,
      });

      if (name === "mood_assessment") {
        await handleMoodAssessmentTool(callId, args);
      } else if (name === "medical_qa") {
        await handleMedicalQaTool(callId, args);
      } else if (name === "search_web") {
        await handleWebSearchTool(callId, args);
      } else {
        sendFunctionCallOutput(callId, `Unknown tool: ${name}`);
        await requestAssistantResponse("default", "none");
      }
    }

    async function handleMoodAssessmentTool(callId, args) {
      const query = (args.query || getLatestUserTranscript() || "").trim();
      try {
        const data = await fetchJson(apiPath("/api/realtime-mood-assessment"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query,
            recent_messages: state.recentMessages,
            mood_aspect_state: state.moodAspectState,
          }),
        });
        const plan = data.plan || {};
        state.moodAspectState = normalizeMoodAspectState(data.mood_aspect_state || plan.mood_aspect_state || state.moodAspectState);
        const toolOutput = buildMoodAssessmentNaturalOutput(data, plan);
        sendFunctionCallOutput(callId, toolOutput);
        const kind = data.status === "ok" ? "mood_assessment_assistant" : "mood_assessment_fallback";
        const moodStatus = moodAssessmentStatus(data, plan);
        setStatus(moodStatus.text, { variant: moodStatus.variant, force: true });
        await requestAssistantResponse(kind, "none", toolOutput);
        setStatus(moodStatus.text, { variant: moodStatus.variant, force: true });
      } catch (error) {
        const toolOutput = "情緒支持策略暫時無法取得。請仍先接住使用者剛才的感受，不診斷、不評分；如果需要追問，只問一個低負擔、貼近情境的問題。";
        sendFunctionCallOutput(callId, toolOutput);
        await requestAssistantResponse("mood_assessment_fallback", "none", toolOutput);
      }
    }

    async function handleMedicalQaTool(callId, args) {
      const query = (args.query || getLatestUserTranscript() || "").trim();
      try {
        const data = await fetchJson(apiPath("/api/realtime-medical-qa"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query }),
        });
        const outputPayload = {
          status: data.status || "ok",
          query,
          matches: data.matches || [],
          error: data.message || undefined,
        };
        const toolOutput = JSON.stringify(outputPayload, null, 2);
        sendFunctionCallOutput(callId, JSON.stringify(outputPayload));
        const kind = data.status === "ok" ? "medical_qa_assistant" : "medical_qa_fallback";
        await requestAssistantResponse(kind, "none", toolOutput);
      } catch (error) {
        const outputPayload = {
          status: "medical_qa_failed",
          query,
          error: error.message,
        };
        const toolOutput = JSON.stringify(outputPayload, null, 2);
        sendFunctionCallOutput(callId, JSON.stringify(outputPayload));
        await requestAssistantResponse("medical_qa_fallback", "none", toolOutput);
      }
    }

    async function handleWebSearchTool(callId, args) {
      const query = (args.query || getLatestUserTranscript() || "").trim();
      try {
        const data = await fetchJson(apiPath("/api/realtime-web-search"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query,
            recent_messages: state.recentMessages,
          }),
        });
        const outputPayload = {
          status: data.status || "ok",
          query,
          web_context: data.web_context || "",
          error: data.message || undefined,
        };
        const toolOutput = JSON.stringify(outputPayload, null, 2);
        sendFunctionCallOutput(callId, JSON.stringify(outputPayload));
        const kind = data.web_context ? "web_search_assistant" : "web_search_fallback";
        await requestAssistantResponse(kind, "none", toolOutput);
      } catch (error) {
        const outputPayload = {
          status: "search_failed",
          query,
          error: error.message,
        };
        const toolOutput = JSON.stringify(outputPayload, null, 2);
        sendFunctionCallOutput(callId, JSON.stringify(outputPayload));
        await requestAssistantResponse("web_search_fallback", "none", toolOutput);
      }
    }

    function sendFunctionCallOutput(callId, output) {
      sendRealtimeEvent({
        type: "conversation.item.create",
        item: {
          type: "function_call_output",
          call_id: callId,
          output: output || "",
        },
      });
    }

    function sendRealtimeEvent(payload) {
      if (state.dc && state.dc.readyState === "open") {
        state.dc.send(JSON.stringify(payload));
      }
    }

    function getPhq8Badge(score) {
      if (!Number.isFinite(score)) {
        return {
          className: "phq-unknown",
          text: "PHQ-8: -",
          title: "未提供 PHQ-8 分數",
        };
      }
      if (score <= 4) {
        return {
          className: "phq-minimal",
          text: `PHQ-8: ${score}`,
          title: `PHQ-8 分數：${score}`,
        };
      }
      if (score <= 9) {
        return {
          className: "phq-mild",
          text: `PHQ-8: ${score}`,
          title: `PHQ-8 分數：${score}`,
        };
      }
      if (score <= 14) {
        return {
          className: "phq-moderate",
          text: `PHQ-8: ${score}`,
          title: `PHQ-8 分數：${score}`,
        };
      }
      if (score <= 19) {
        return {
          className: "phq-moderately-severe",
          text: `PHQ-8: ${score}`,
          title: `PHQ-8 分數：${score}`,
        };
      }
      return {
        className: "phq-severe",
        text: `PHQ-8: ${score}`,
        title: `PHQ-8 分數：${score}`,
      };
    }

    function markSessionReady() {
      setSessionPhase(SESSION_PHASE.LIVE);
    }

    async function stopAndUpload(endReason) {
      if (state.stopping || state.sessionPhase !== SESSION_PHASE.LIVE) return;
      state.stopping = true;
      setSessionPhase(SESSION_PHASE.UPLOADING);
      state.sessionGeneration++;
      state.responseRequestGeneration++;
      setMicrophoneButtonEnabled(false);
      setStatus("上傳中");
      setNotice("正在整理錄音、錄影與逐字稿...");

      try {
        const archive = await cleanupSession(true, endReason);
        const uploadResult = await uploadArchive(archive);
        state.stopping = false;
        setSessionPhase(SESSION_PHASE.ENDED);
        setStatus("已上傳");
        handleDepressionUploadResponse(uploadResult);
        els.chooseAgainButton.disabled = false;
      } catch (error) {
        state.stopping = false;
        setSessionPhase(SESSION_PHASE.ENDED);
        setStatus("上傳失敗");
        setNotice(`上傳失敗：${error.message}。這段對話已在本機整理完成，請檢查伺服器後重新開始。`);
        els.chooseAgainButton.disabled = false;
      }
    }

    async function cleanupSession(buildArchive, endReason = "user_stop") {
      state.sessionReady = false;
      setAssistantAudioActive(false, { immediate: true });

      if (state.dc) {
        try { state.dc.close(); } catch {}
        state.dc = null;
      }
      if (state.pc) {
        try { state.pc.close(); } catch {}
        state.pc = null;
      }
      if (state.outboundAudioTrack) {
        state.outboundAudioTrack.stop();
        state.outboundAudioTrack = null;
      }

      let userAudioBlob = null;
      let assistantAudioBlob = null;
      let videoFramesBlob = null;
      let videoFrameMetadata = null;
      const userSampleRate = state.userRecorder?.sampleRate || 0;
      const assistantSampleRate = state.assistantRecorder?.sampleRate || 24000;

      if (state.userRecorder) {
        userAudioBlob = await state.userRecorder.stop();
        state.userRecorder = null;
      }
      if (state.assistantRecorder) {
        assistantAudioBlob = await state.assistantRecorder.stop();
        state.assistantRecorder = null;
      }
      if (state.frameSampler) {
        const sampler = state.frameSampler;
        videoFramesBlob = await sampler.stop();
        videoFrameMetadata = sampler.metadata();
        state.frameSampler = null;
      }
      if (userAudioBlob && userAudioBlob.size <= 44) {
        userAudioBlob = null;
      }
      if (assistantAudioBlob && assistantAudioBlob.size <= 44) {
        assistantAudioBlob = null;
      }
      if (videoFrameMetadata && !videoFrameMetadata.frame_count) {
        videoFramesBlob = null;
      }
      finalizeCurrentUserSpeechInterval();

      if (state.localStream) {
        state.localStream.getTracks().forEach((track) => track.stop());
        state.localStream = null;
      }
      if (state.remoteStream) {
        state.remoteStream.getTracks().forEach((track) => track.stop());
        state.remoteStream = null;
      }
      els.localVideo.srcObject = null;
      els.remoteAudio.srcObject = null;
      setMicrophoneButtonEnabled(false);
      setMicrophoneMuted(false);

      if (!buildArchive) return null;

      const endedAtMs = Date.now();
      const metadata = compactObject({
        schema_version: "companion-thesis-realtime-v1",
        account_id: state.sessionHash,
        session_hash: state.sessionHash,
        started_at_ms: state.startedAtMs,
        ended_at_ms: endedAtMs,
        started_at_iso: new Date(state.startedAtMs).toISOString(),
        ended_at_iso: new Date(endedAtMs).toISOString(),
        end_reason: endReason,
        archive_audio_enabled: state.archiveAudioEnabled,
        archive_video_enabled: state.archiveVideoEnabled,
        user_audio_sample_rate: userAudioBlob ? userSampleRate : null,
        user_audio_format: userAudioBlob ? "wav_pcm_s16le_mono" : null,
        assistant_audio_sample_rate: assistantAudioBlob ? assistantSampleRate : null,
        assistant_audio_format: assistantAudioBlob ? "wav_pcm_s16le_mono" : null,
        user_speech_interval_count: state.userSpeechIntervals.length,
        user_speech_interval_source: "realtime.input_audio_buffer.speech_started_stopped",
        user_speech_interval_timebase: "seconds_since_session_started_at_ms",
        user_speech_interval_alignment: "wall_clock_approximation_not_sample_exact",
        transcript_event_count: state.transcriptEvents.length,
        source: "web_realtime",
        selected_user: state.selectedUser,
        video_frame_source: videoFrameMetadata?.source || null,
        video_frame_sampling_interval_ms: videoFrameMetadata?.sampling_interval_ms || null,
        video_frame_target_width: videoFrameMetadata?.target_width || null,
        video_frame_target_height: videoFrameMetadata?.target_height || null,
        video_frame_jpeg_quality: videoFrameMetadata?.jpeg_quality || null,
        video_frame_count: videoFrameMetadata?.frame_count || 0,
        video_frame_naming: videoFramesBlob ? "frame_000001.jpg" : null,
        video_frames_file: videoFramesBlob ? "media/video_frames.zip" : null,
        user_audio_file: userAudioBlob ? "media/user_audio.wav" : null,
        assistant_audio_file: assistantAudioBlob ? "media/assistant_audio.wav" : null,
      });
      const transcript = {
        schema_version: "companion-thesis-transcript-v1",
        account_id: state.sessionHash,
        session_hash: state.sessionHash,
        timebase: "seconds_since_session_started_at_ms",
        participant_role: "user",
        events: state.transcriptEvents,
        plain_text: state.transcriptLines.join("\n"),
      };

      return {
        metadataBlob: jsonBlob(metadata),
        transcriptBlob: jsonBlob(transcript),
        userAudioBlob,
        assistantAudioBlob,
        videoFramesBlob,
      };
    }

    async function uploadArchive(archive) {
      if (!archive) return;
      const formData = new FormData();
      formData.append("account_id", state.sessionHash);
      formData.append("session_hash", state.sessionHash);
      formData.append("metadata_file", archive.metadataBlob, "metadata.json");
      formData.append("transcript_file", archive.transcriptBlob, "transcript.json");
      if (archive.userAudioBlob) {
        formData.append("user_audio_file", archive.userAudioBlob, "user_audio.wav");
      }
      if (archive.assistantAudioBlob) {
        formData.append("assistant_audio_file", archive.assistantAudioBlob, "assistant_audio.wav");
      }
      if (archive.videoFramesBlob) {
        formData.append("video_frames_file", archive.videoFramesBlob, "video_frames.zip");
      }

      const response = await fetch(apiPath("/api/realtime-session"), {
        method: "POST",
        body: formData,
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.status === "error") {
        throw new Error(data.message || `HTTP ${response.status}`);
      }
      return data;
    }

    function handleDepressionUploadResponse(data) {
      const runId = data?.run_id || "";
      const detection = data?.depression_detection || {};
      const depressionStatus = detection.status || "";
      state.depressionRunId = runId;
      if (depressionStatus === "queued" || depressionStatus === "running") {
        showDepressionLoading();
        setStatus("評估中", { force: true });
        setNotice("上傳完成，憂鬱偵測正在背景執行。完成後會在這裡更新摘要。");
        startDepressionPolling(state.sessionHash, runId);
        return;
      }
      if (depressionStatus === "disabled") {
        showDepressionMessage("評估未啟用", "目前伺服器已停用憂鬱偵測。");
        setNotice("上傳完成。憂鬱偵測目前已停用。");
        return;
      }
      if (depressionStatus === "error") {
        showDepressionMessage(
          "無法開始評估",
          detection.message || detection.error || "未知錯誤"
        );
        setNotice(`上傳完成，但憂鬱偵測排程失敗：${detection.message || detection.error || "未知錯誤"}`);
        return;
      }
      setNotice("上傳完成。現在可以返回選單頁面，或重新開始同一位使用者的對話。");
    }

    function clearDepressionPolling() {
      if (state.depressionPollTimer) {
        window.clearTimeout(state.depressionPollTimer);
        state.depressionPollTimer = null;
      }
    }

    function startDepressionPolling(sessionHash, runId) {
      clearDepressionPolling();
      if (!sessionHash || !runId) return;
      state.depressionPollAttempts = 0;
      pollDepressionStatus(sessionHash, runId);
    }

    async function pollDepressionStatus(sessionHash, runId) {
      if (state.sessionHash !== sessionHash || state.depressionRunId !== runId) return;
      state.depressionPollAttempts += 1;
      try {
        const data = await fetchJson(
          apiPath(`/api/realtime-session/${encodeURIComponent(sessionHash)}/${encodeURIComponent(runId)}/depression`)
        );
        if (renderDepressionStatus(data)) {
          clearDepressionPolling();
          return;
        }
      } catch (error) {
        if (state.depressionPollAttempts >= DEPRESSION_POLL_MAX_ATTEMPTS) {
          showDepressionRetryMessage(
            "評估狀態查詢失敗",
            `${error.message} 關閉視窗後可按「評估結果」重新查詢。`
          );
          setStatus("已上傳", { force: true });
          setNotice(`上傳完成，但憂鬱偵測狀態查詢失敗：${error.message}`);
          clearDepressionPolling();
          return;
        }
      }

      if (state.depressionPollAttempts >= DEPRESSION_POLL_MAX_ATTEMPTS) {
        showDepressionRetryMessage(
          "評估仍在背景執行",
          "已超過前端等待時間。關閉視窗後可按「評估結果」重新查詢。"
        );
        setStatus("已上傳", { force: true });
        setNotice("上傳完成，憂鬱偵測仍在背景執行；稍後可重新整理查看結果。");
        clearDepressionPolling();
        return;
      }
      state.depressionPollTimer = window.setTimeout(
        () => pollDepressionStatus(sessionHash, runId),
        DEPRESSION_POLL_INTERVAL_MS
      );
    }

    function renderDepressionStatus(data) {
      const status = data?.depression_status || "";
      if (status === "queued" || status === "running") {
        showDepressionLoading(false);
        setStatus("評估中", { force: true });
        setNotice("上傳完成，憂鬱偵測正在背景執行。完成後會在這裡更新摘要。");
        return false;
      }
          if (status === "ok") {
            renderDepressionResult(data);
            setStatus("已上傳", { force: true });
            const score = Number(data.depression_total_score);
            const scoreText = Number.isFinite(score) ? score.toFixed(1) : "-";
            setNotice(`上傳完成。憂鬱偵測完成：PHQ-8 估計總分 ${scoreText}。`);
            return true;
          }
      if (status === "error") {
        showDepressionMessage(
          "評估失敗",
          data.depression_error || "未知錯誤"
        );

        setNotice(`上傳完成，但憂鬱偵測失敗：${data.depression_error || "未知錯誤"}`);
        return true;
      }
      if (status === "interrupted") {
        showDepressionMessage(
          "評估已中斷",
          data.depression_error || "伺服器重啟導致背景工作中斷。"

        return true;
      }
      if (status === "disabled") {
        showDepressionMessage("評估未啟用", "目前伺服器已停用憂鬱偵測。");
        setStatus("已上傳", { force: true });
        setNotice("上傳完成。憂鬱偵測目前已停用。");
        return true;
      }
      if (status === "unavailable") {
        showDepressionMessage(

        );
        setStatus("已上傳", { force: true });
        setNotice("上傳完成。GPU worker 目前不可用，未執行憂鬱偵測。");
        return true;
      }
      return false;

    function setSessionPhase(phase) {
      state.sessionPhase = phase;
      state.sessionReady = phase === SESSION_PHASE.LIVE;
      state.sessionStarting = phase === SESSION_PHASE.STARTING || phase === SESSION_PHASE.RESTARTING;
      state.uploading = phase === SESSION_PHASE.UPLOADING;
      state.endButtonUnlocked = phase === SESSION_PHASE.LIVE;
      state.restartReady = phase === SESSION_PHASE.ENDED || phase === SESSION_PHASE.ERROR;
      const controlsDisabled = state.sessionStarting || state.uploading;
      setAllButtonsDisabled(controlsDisabled);
      switch (phase) {
        case SESSION_PHASE.LIVE:
          endButtonController.showEnd();
          break;
        case SESSION_PHASE.ENDED:
          endButtonController.showRestart("重新開始");
          break;
        case SESSION_PHASE.ERROR:
          endButtonController.showRestart("重新連線");
          break;
        case SESSION_PHASE.UPLOADING:
          endButtonController.showBusy("上傳中");
          break;
        case SESSION_PHASE.STARTING:
        case SESSION_PHASE.RESTARTING:
          endButtonController.showBusy("啟動中");
          break;
        case SESSION_PHASE.SELECTING:
        default:
          endButtonController.showIdle();
      }
      setMicrophoneButtonEnabled(phase === SESSION_PHASE.LIVE && Boolean(state.localStream));
      setTextInputEnabled(phase === SESSION_PHASE.LIVE && state.dc?.readyState === "open");
      els.chooseAgainButton.disabled = phase !== SESSION_PHASE.ENDED && phase !== SESSION_PHASE.ERROR;
    }

        button.title = title;
        button.setAttribute("aria-label", title);

      }

      return {
        showIdle() {
          action = "none";

      els.muteMicButton.setAttribute("aria-label", els.muteMicButton.title);

    function applyMicrophoneTrackState() {
      if (state.localStream) {
        for (const track of state.localStream.getAudioTracks()) {
          track.enabled = !state.microphoneMuted;
        }
      }
      if (state.outboundAudioTrack) {
        state.outboundAudioTrack.enabled = (
          !state.microphoneMuted
          && (!state.assistantAudioActive || state.bargeInActive)
        );
      }
    }

    function setAssistantAudioActive(active, { immediate = false } = {}) {
      if (state.assistantAudioReleaseTimer) {
        window.clearTimeout(state.assistantAudioReleaseTimer);
        state.assistantAudioReleaseTimer = null;
      }
      if (!active && !immediate) {
        scheduleAssistantAudioRelease();
        return;
      }
      if (active && !state.assistantAudioActive) {
        state.bargeInActive = false;
        state.bargeInVoiceFrames = 0;
        state.assistantEchoFloor = 0;
      }
      if (state.assistantAudioActive === active) return;
      state.assistantAudioActive = active;
      if (!active) {
        state.bargeInActive = false;
        state.bargeInVoiceFrames = 0;
        state.assistantEchoFloor = 0;
      }
      applyMicrophoneTrackState();
    }

    function scheduleAssistantAudioRelease(delayMs = ASSISTANT_AUDIO_RELEASE_DELAY_MS) {
      if (state.assistantAudioReleaseTimer) {
        window.clearTimeout(state.assistantAudioReleaseTimer);
      }
      state.assistantAudioReleaseTimer = window.setTimeout(() => {
        state.assistantAudioReleaseTimer = null;
        if (!state.assistantAudioActive) return;
        state.assistantAudioActive = false;
        state.bargeInActive = false;
        state.bargeInVoiceFrames = 0;
        state.assistantEchoFloor = 0;
        applyMicrophoneTrackState();
      }, delayMs);
    }

    function detectBargeIn(userVolume, remoteVolume) {
      if (
        !state.assistantAudioActive
        || state.bargeInActive
        || state.microphoneMuted
        || !state.outboundAudioTrack
      ) {
        state.bargeInVoiceFrames = 0;
        return;
      }

      const threshold = Math.max(
        BARGE_IN_VOICE_THRESHOLD,
        state.assistantEchoFloor * 2.0,
        remoteVolume * 0.12
      );
      if (userVolume >= threshold) {
        state.bargeInVoiceFrames += 1;
      } else {
        state.bargeInVoiceFrames = Math.max(0, state.bargeInVoiceFrames - 1);
        state.assistantEchoFloor = state.assistantEchoFloor
          ? state.assistantEchoFloor * 0.92 + userVolume * 0.08
          : userVolume;
      }
      if (state.bargeInVoiceFrames < BARGE_IN_REQUIRED_FRAMES) return;

      state.bargeInActive = true;
      state.bargeInVoiceFrames = 0;
      applyMicrophoneTrackState();
      if (state.currentResponseId) {
        sendRealtimeEvent({
          type: "response.cancel",
          response_id: state.currentResponseId,
        });
      }
      setStatus("使用者說話中");
    }

    function inferPathPrefix() {
      const path = window.location.pathname || "";
      const trimmedPath = path.replace(/\/+$/, "");
      if (!trimmedPath) return "";

      const realtimeMarker = "/realtime";
      const realtimeIndex = trimmedPath.lastIndexOf(realtimeMarker);
      if (realtimeIndex > 0 && realtimeIndex + realtimeMarker.length === trimmedPath.length) {
        return trimmedPath.slice(0, realtimeIndex);

      if (trimmedPath === realtimeMarker) {
        return "";

      return trimmedPath === "/" ? "" : trimmedPath;

    class PcmWavRecorder {
      constructor(stream) {
        this.stream = stream;
        this.audioContext = null;
        this.source = null;
        this.processor = null;
        this.silentGain = null;
        this.buffers = [];
        this.sampleRate = 0;
      }

      async start() {
        this.audioContext = new AudioContext();
        this.sampleRate = this.audioContext.sampleRate;
        this.source = this.audioContext.createMediaStreamSource(this.stream);
        this.processor = this.audioContext.createScriptProcessor(4096, 1, 1);
        this.silentGain = this.audioContext.createGain();
        this.silentGain.gain.value = 0;
        this.processor.onaudioprocess = (event) => {
          const input = event.inputBuffer.getChannelData(0);
          this.buffers.push(new Float32Array(input));
        };
        this.source.connect(this.processor);
        this.processor.connect(this.silentGain);
        this.silentGain.connect(this.audioContext.destination);
      }

      async stop() {
        if (this.processor) {
          this.processor.disconnect();
          this.processor.onaudioprocess = null;
        }
        if (this.source) this.source.disconnect();
        if (this.silentGain) this.silentGain.disconnect();
        if (this.audioContext) await this.audioContext.close().catch(() => {});
        return createWavBlob(this.buffers, this.sampleRate || 48000);
      }
    }

    class FrameSampler {
      constructor(video, onCount) {
        this.video = video;
        this.onCount = onCount;
        this.intervalMs = 250;
        this.targetWidth = 640;
        this.targetHeight = 360;
        this.jpegQuality = 0.7;
        this.canvas = document.createElement("canvas");
        this.ctx = this.canvas.getContext("2d", { willReadFrequently: false });
        this.frames = [];
        this.timer = null;
        this.busy = false;
      }

      start() {
        this.timer = window.setInterval(() => this.capture(), this.intervalMs);
      }

      async capture() {
        if (this.busy || this.video.readyState < 2) return;
        this.busy = true;
        try {
          const sourceWidth = this.video.videoWidth || 640;
          const sourceHeight = this.video.videoHeight || 360;
          const scale = Math.min(this.targetWidth / sourceWidth, this.targetHeight / sourceHeight, 1);
          const width = Math.max(1, Math.round(sourceWidth * scale));
          const height = Math.max(1, Math.round(sourceHeight * scale));
          this.canvas.width = width;
          this.canvas.height = height;
          this.ctx.drawImage(this.video, 0, 0, width, height);
          const blob = await new Promise((resolve) => this.canvas.toBlob(resolve, "image/jpeg", this.jpegQuality));
          if (blob && blob.size > 0) {
            const name = `frame_${String(this.frames.length + 1).padStart(6, "0")}.jpg`;
            this.frames.push({ name, blob });
            if (this.onCount) this.onCount(this.frames.length);
          }
        } finally {
          this.busy = false;
        }
      }

      async stop() {
        if (this.timer) {
          window.clearInterval(this.timer);
          this.timer = null;
        }
        await this.capture();
        return createZip(this.frames);
      }

      metadata() {
        return {
          source: "browser_getUserMedia_canvas_jpeg",
          sampling_interval_ms: this.intervalMs,
          target_width: this.targetWidth,
          target_height: this.targetHeight,
          jpeg_quality: this.jpegQuality,
          frame_count: this.frames.length,
        };
      }
    }

    function createWavBlob(buffers, sampleRate) {
      const totalLength = buffers.reduce((sum, buffer) => sum + buffer.length, 0);
      const pcm = new Int16Array(totalLength);
      let offset = 0;
      for (const buffer of buffers) {
        for (let i = 0; i < buffer.length; i += 1) {
          const sample = Math.max(-1, Math.min(1, buffer[i]));
          pcm[offset++] = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
        }
      }

      const wav = new ArrayBuffer(44 + pcm.byteLength);
      const view = new DataView(wav);
      writeAscii(view, 0, "RIFF");
      view.setUint32(4, 36 + pcm.byteLength, true);
      writeAscii(view, 8, "WAVE");
      writeAscii(view, 12, "fmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeAscii(view, 36, "data");
      view.setUint32(40, pcm.byteLength, true);
      new Int16Array(wav, 44).set(pcm);
      return new Blob([wav], { type: "audio/wav" });
    }

    function writeAscii(view, offset, text) {
      for (let i = 0; i < text.length; i += 1) {
        view.setUint8(offset + i, text.charCodeAt(i));
      }
    }

    async function createZip(files) {
      const encoder = new TextEncoder();
      const localParts = [];
      const centralParts = [];
      let offset = 0;
      const now = new Date();
      const dosTime = ((now.getHours() & 31) << 11) | ((now.getMinutes() & 63) << 5) | ((Math.floor(now.getSeconds() / 2)) & 31);
      const dosDate = (((now.getFullYear() - 1980) & 127) << 9) | (((now.getMonth() + 1) & 15) << 5) | (now.getDate() & 31);

      for (const file of files) {
        const nameBytes = encoder.encode(file.name);
        const data = new Uint8Array(await file.blob.arrayBuffer());
        const crc = crc32(data);

        const localHeader = new ArrayBuffer(30 + nameBytes.length);
        const localView = new DataView(localHeader);
        localView.setUint32(0, 0x04034b50, true);
        localView.setUint16(4, 20, true);
        localView.setUint16(6, 0, true);
        localView.setUint16(8, 0, true);
        localView.setUint16(10, dosTime, true);
        localView.setUint16(12, dosDate, true);
        localView.setUint32(14, crc, true);
        localView.setUint32(18, data.length, true);
        localView.setUint32(22, data.length, true);
        localView.setUint16(26, nameBytes.length, true);
        localView.setUint16(28, 0, true);
        new Uint8Array(localHeader, 30).set(nameBytes);
        localParts.push(new Uint8Array(localHeader), data);

        const centralHeader = new ArrayBuffer(46 + nameBytes.length);
        const centralView = new DataView(centralHeader);
        centralView.setUint32(0, 0x02014b50, true);
        centralView.setUint16(4, 20, true);
        centralView.setUint16(6, 20, true);
        centralView.setUint16(8, 0, true);
        centralView.setUint16(10, 0, true);
        centralView.setUint16(12, dosTime, true);
        centralView.setUint16(14, dosDate, true);
        centralView.setUint32(16, crc, true);
        centralView.setUint32(20, data.length, true);
        centralView.setUint32(24, data.length, true);
        centralView.setUint16(28, nameBytes.length, true);
        centralView.setUint16(30, 0, true);
        centralView.setUint16(32, 0, true);
        centralView.setUint16(34, 0, true);
        centralView.setUint16(36, 0, true);
        centralView.setUint32(38, 0, true);
        centralView.setUint32(42, offset, true);
        new Uint8Array(centralHeader, 46).set(nameBytes);
        centralParts.push(new Uint8Array(centralHeader));

        offset += localHeader.byteLength + data.length;
      }

      const centralSize = centralParts.reduce((sum, part) => sum + part.length, 0);
      const end = new ArrayBuffer(22);
      const endView = new DataView(end);
      endView.setUint32(0, 0x06054b50, true);
      endView.setUint16(4, 0, true);
      endView.setUint16(6, 0, true);
      endView.setUint16(8, files.length, true);
      endView.setUint16(10, files.length, true);
      endView.setUint32(12, centralSize, true);
      endView.setUint32(16, offset, true);
      endView.setUint16(20, 0, true);

      return new Blob([...localParts, ...centralParts, new Uint8Array(end)], { type: "application/zip" });
    }

    let crcTable = null;
    function crc32(data) {
      if (!crcTable) {
        crcTable = new Uint32Array(256);
        for (let n = 0; n < 256; n += 1) {
          let c = n;
          for (let k = 0; k < 8; k += 1) {
            c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
          }
          crcTable[n] = c >>> 0;
        }
      }
      let crc = 0xffffffff;
      for (let i = 0; i < data.length; i += 1) {
        crc = crcTable[(crc ^ data[i]) & 0xff] ^ (crc >>> 8);
      }
      return (crc ^ 0xffffffff) >>> 0;
    }
    /* ===== Visualizer Orb ===== */
    let vizAnimFrame = null;
    let vizAudioCtx = null;
    let vizUserAnalyser = null;
    let vizRemoteAnalyser = null;
    let vizUserData = null;
    let vizRemoteData = null;

    function updateAssistantAudioGlow(level = 0, active = false) {
      if (!els.assistantAudioGlow) return;
      const normalized = Math.max(0, Math.min(1, level));
      els.assistantAudioGlow.style.setProperty("--glow-level", normalized.toFixed(3));
      els.assistantAudioGlow.style.setProperty("--glow-scale", (0.92 + normalized * 0.16).toFixed(3));
      els.assistantAudioGlow.classList.toggle("is-active", active || normalized > 0.015);
    }

    function startVisualizer() {
      stopVisualizer();

      // Try to set up audio analysers
      try {
        vizAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) { /* ignore */ }

      // Connect analysers when streams become available
      const tryConnectAnalysers = () => {
        if (vizAudioCtx && state.localStream && !vizUserAnalyser) {
          try {
            const src = vizAudioCtx.createMediaStreamSource(state.localStream);
            vizUserAnalyser = vizAudioCtx.createAnalyser();
            vizUserAnalyser.fftSize = 1024;
            vizUserAnalyser.smoothingTimeConstant = 0.86;
            src.connect(vizUserAnalyser);
            vizUserData = new Uint8Array(vizUserAnalyser.fftSize);
          } catch (e) { /* ignore */ }
        }
        if (vizAudioCtx && state.remoteStream && !vizRemoteAnalyser) {
          try {
            const src = vizAudioCtx.createMediaStreamSource(state.remoteStream);
            vizRemoteAnalyser = vizAudioCtx.createAnalyser();
            vizRemoteAnalyser.fftSize = 1024;
            vizRemoteAnalyser.smoothingTimeConstant = 0.88;
            src.connect(vizRemoteAnalyser);
            vizRemoteData = new Uint8Array(vizRemoteAnalyser.fftSize);
          } catch (e) { /* ignore */ }
        }
      };

      function getVolume(analyser, dataArray) {
        if (!analyser || !dataArray) return 0;
        analyser.getByteTimeDomainData(dataArray);
        let sum = 0;
        for (let i = 0; i < dataArray.length; i += 1) {
          const centered = (dataArray[i] - 128) / 128;
          sum += centered * centered;
        }
        return Math.min(1, Math.sqrt(sum / dataArray.length) * 2.6);
      }

      let assistantGlowSmoothed = 0;
      function draw() {
        tryConnectAnalysers();
        const userVol = getVolume(vizUserAnalyser, vizUserData);
        const remoteVol = getVolume(vizRemoteAnalyser, vizRemoteData);
        detectBargeIn(userVol, remoteVol);
        if (remoteVol > ASSISTANT_AUDIO_LEVEL_THRESHOLD) {
          setAssistantAudioActive(true);
          scheduleAssistantAudioRelease();
        }
        const vol = Math.max(userVol * 0.8, remoteVol * 1.5);
        const assistantGlowTarget = Math.min(1, 0.05 + remoteVol * 8.4);
        const glowEase = assistantGlowTarget > assistantGlowSmoothed ? 0.2 : 0.08;
        assistantGlowSmoothed += (assistantGlowTarget - assistantGlowSmoothed) * glowEase;
        updateAssistantAudioGlow(assistantGlowSmoothed, true);

        // Animate stop/again button dots:
        const dotEls = els.endSessionButton.querySelectorAll('.pill-dots i');
        if (dotEls.length === 3) {
          const factors = [0.8, 1.4, 0.9];
          dotEls.forEach((dot, idx) => {
            const v = vol * factors[idx];
            const h = Math.max(4, Math.min(22, 4 + v * 28)); // height between 4px and 22px
            dot.style.height = `${h}px`;
          });
        }

        vizAnimFrame = requestAnimationFrame(draw);
      }

      vizAnimFrame = requestAnimationFrame(draw);
    }

    function stopVisualizer() {
      if (vizAnimFrame) {
        cancelAnimationFrame(vizAnimFrame);
        vizAnimFrame = null;
      }
      if (state._vizResizeHandler) {
        window.removeEventListener('resize', state._vizResizeHandler);
        state._vizResizeHandler = null;
      }
      vizUserAnalyser = null;
      vizRemoteAnalyser = null;
      vizUserData = null;
      vizRemoteData = null;
      updateAssistantAudioGlow(0, false);
      if (vizAudioCtx) {
        vizAudioCtx.close().catch(() => {});
        vizAudioCtx = null;
      }
    }
  </script>
