      const checkIcon = `<svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width: 12px; height: 12px; display: block;"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
      const crossIcon = `<svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width: 12px; height: 12px; display: block;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
      const globeIcon = `<svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width: 13px; height: 13px; animation: status-pulse 1.25s ease-in-out infinite; display: block;"><circle cx="12" cy="12" r="10"></circle><path d="M2 12h20"></path><path d="M12 2a15.3 15.3 0 0 1 0 20M12 2a15.3 15.3 0 0 0 0 20"></path></svg>`;
      const medicalIcon = `<svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 13px; height: 13px; animation: status-pulse 1.25s ease-in-out infinite; display: block;"><path d="M12 5v14M5 12h14"></path></svg>`;
      const clipboardIcon = `<svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" style="width: 13px; height: 13px; animation: status-pulse 1.25s ease-in-out infinite; display: block;"><rect x="6" y="4" width="12" height="17" rx="2"></rect><path d="M9 4.5A2.5 2.5 0 0 1 11.5 2h1A2.5 2.5 0 0 1 15 4.5"></path><path d="M9 11h6M9 15h4"></path></svg>`;
      const compassIcon = `<svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width: 13px; height: 13px; animation: status-pulse 1.25s ease-in-out infinite; display: block;"><circle cx="12" cy="12" r="10"></circle><path d="m16 8-2.2 5.8L8 16l2.2-5.8z"></path></svg>`;
      const heartIcon = `<svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width: 13px; height: 13px; animation: status-pulse 1.25s ease-in-out infinite; display: block;"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"></path></svg>`;
      const arrowIcon = `<svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 13px; height: 13px; animation: status-bounce-y 1.1s ease-in-out infinite; display: block;"><path d="M5 12h14"></path><path d="m13 6 6 6-6 6"></path></svg>`;
      const shieldIcon = `<svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width: 13px; height: 13px; animation: status-pulse 1.25s ease-in-out infinite; display: block;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path></svg>`;

      const map = {
        "啟動中": { text: "啟動中", icon: spinnerIcon, variant: "working" },
        "重新啟動中": { text: "啟動中", icon: spinnerIcon, variant: "working" },
        "連線中": { text: "連線中", icon: spinnerIcon, variant: "working" },
        "已連線": { text: "已連線", icon: greenDotIcon, variant: "connected" },
        "未連線": { text: "未連線", icon: redDotIcon, variant: "offline" },
        "斷線": { text: "斷線", icon: redDotIcon, variant: "offline" },
        "出錯": { text: "連線出錯", icon: crossIcon, variant: "error" },
        "錯誤": { text: "連線出錯", icon: crossIcon, variant: "error" },
        "助理回覆中": { text: "回覆中", icon: speakerIcon, variant: "replying" },
        "使用者說話中": { text: "聆聽中", icon: soundwaveIcon, variant: "listening" },
        "說話中": { text: "聆聽中", icon: soundwaveIcon, variant: "listening" },
        "聆聽中": { text: "聆聽中", icon: soundwaveIcon, variant: "listening" },
        "正在思考": { text: "思考中", icon: sparkleIcon, variant: "thinking" },
        "思考中": { text: "思考中", icon: sparkleIcon, variant: "thinking" },
        "判斷中": { text: "思考中", icon: sparkleIcon, variant: "thinking" },
        "評估中": { text: "思考中", icon: sparkleIcon, variant: "thinking" },
        "上傳中": { text: "上傳中", icon: cloudUploadIcon, variant: "uploading" },
        "已上傳": { text: "已上傳", icon: checkIcon, variant: "uploaded" },
        "上傳失敗": { text: "上傳失敗", icon: crossIcon, variant: "error" }
      };

      const variantColors = {
        connected: "#1c1c1e",
        offline: "#1c1c1e",
        error: "#ff3b30",
        listening: "#007aff",
        thinking: "#ff9500",
        replying: "#5856d6",
        uploading: "#1c1c1e",
        uploaded: "#1c1c1e",
        working: "#8e8e93",
        "tool-web": "#007aff",
        "tool-medical": "#00a36c",
        "tool-phq": "#af52de",
        tool: "#af52de",
        "stage-exploration": "#007aff",
        "stage-comforting": "#ff2d55",
        "stage-action": "#30a46c",
        "stage-crisis": "#ff3b30",
      };
      const variantIconColors = {
        connected: "#34c759",
        offline: "#ff3b30",
        uploading: "#007aff",
        uploaded: "#34c759",
      };
      const dynamicToolIcon = variant === "tool-web" ? globeIcon
        : variant === "tool-medical" ? medicalIcon
          : variant === "tool-phq" ? clipboardIcon
            : null;
      const dynamicStageIcon = variant === "stage-exploration" ? compassIcon
        : variant === "stage-comforting" ? heartIcon
          : variant === "stage-action" ? arrowIcon
            : variant === "stage-crisis" ? shieldIcon
              : null;
      const matched = map[text] || {
        text,
        icon: dynamicToolIcon || dynamicStageIcon || greenDotIcon,
        variant: variant || "connected",
      };
      const resolvedVariant = variant || matched.variant || "connected";
      const color = variantColors[resolvedVariant] || "#1c1c1e";
      const iconColor = variantIconColors[resolvedVariant] || color;
      const renderedStatus = `<span class="status-icon-color" style="color: ${iconColor};">${matched.icon}</span><span>${matched.text}</span>`;
      if (els.statusPill) {
        els.statusPill.innerHTML = renderedStatus;
        els.statusPill.style.color = color;
        els.statusPill.style.opacity = "1";
        els.statusPill.style.visibility = "visible";
      }
      statusLabel.style.color = color;
      statusLabel.innerHTML = renderedStatus;

      if (!text || text === "未連線" || text === "斷線") {
        statusLabel.style.opacity = "0";
        statusLabel.style.visibility = "hidden";
      } else {
        statusLabel.style.opacity = "1";
        statusLabel.style.visibility = "visible";
      }
    }

    function setNotice(text) {
      if (els.sessionNotice) els.sessionNotice.textContent = text;
    }

    function setSessionStatus(text) {
      els.sessionStatus.textContent = text;
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, options);
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.status === "error") {
        throw new Error(data.message || `HTTP ${response.status}`);
      }
      return data;
    }

    function inferPathPrefix() {
      const path = window.location.pathname || "";
      const trimmedPath = path.replace(/\/+$/, "");
      if (!trimmedPath) return "";

      const realtimeMarker = "/realtime";
      const realtimeIndex = trimmedPath.lastIndexOf(realtimeMarker);
      if (realtimeIndex > 0 && realtimeIndex + realtimeMarker.length === trimmedPath.length) {
        return trimmedPath.slice(0, realtimeIndex);
      }
      if (trimmedPath === realtimeMarker) {
        return "";
      }

      return trimmedPath === "/" ? "" : trimmedPath;
    }

    function apiPath(path) {
      return `${API_BASE}${path}`;
    }

    function jsonBlob(value) {
      return new Blob([JSON.stringify(value, null, 2)], { type: "application/json;charset=utf-8" });
    }

    function normalizeMoodAspectState(value) {
      const source = value && typeof value === "object" ? value : {};
      const covered = Array.isArray(source.covered_aspects)
        ? source.covered_aspects.map((item) => String(item || "").trim()).filter(Boolean)
        : [];
      const remaining = Array.isArray(source.remaining_aspects)
        ? source.remaining_aspects.map((item) => String(item || "").trim()).filter(Boolean)
        : [];
      return {
        covered_aspects: [...new Set(covered)],
        remaining_aspects: [...new Set(remaining)],
      };
    }

    function buildMoodAssessmentNaturalOutput(data, plan) {
      const source = plan && typeof plan === "object" ? plan : {};
      const guidance = String(data.response_guidance || source.response_guidance || "").trim();
      const followUp = String(data.suggested_follow_up || source.suggested_follow_up || "").trim();
      const riskLevel = String(data.risk_level || source.risk_level || "").trim();
      const parts = [];
      if (riskLevel === "high" || riskLevel === "imminent") {
        parts.push("這一輪請先溫和、直接地確認使用者當下是否安全，不要急著追問其他面向。");
      }
      if (guidance) {
        parts.push(guidance);
      }
      if (followUp) {
        parts.push(`如果要往下接，可以自然地問：「${followUp}」`);
      }
      if (!parts.length) {
        parts.push("請先接住使用者剛才的感受，不診斷、不評分；如果需要追問，只問一個低負擔、貼近情境的問題。");
      }
      return parts.join("\n");
    }

    function moodAspectStatusLabels(keys, labels) {
      const shortLabels = {
        interest: "興趣",
        mood: "心情",
        sleep: "睡眠",
        fatigue: "疲倦",
        appetite_weight: "食慾",
        self_worth: "自責",
        concentration: "注意力",
        psychomotor: "動作",
      };
      const normalizedKeys = Array.isArray(keys) ? keys : [];
      const normalizedLabels = Array.isArray(labels) ? labels : [];
      const values = normalizedKeys.length
        ? normalizedKeys.map((key) => shortLabels[key] || String(key || "").trim()).filter(Boolean)
        : normalizedLabels.map((label) => String(label || "").replace("或體重", "").replace("沒精神", "").trim()).filter(Boolean);
      return [...new Set(values)].slice(0, 3);
    }

    function moodStageStatus(stage) {
      const map = {
        exploration: { label: "探索", variant: "stage-exploration" },
        comforting: { label: "安撫", variant: "stage-comforting" },
        action: { label: "建議", variant: "stage-action" },
        crisis_check: { label: "安全確認", variant: "stage-crisis" },
      };
      return map[String(stage || "").trim()] || { label: "探索", variant: "stage-exploration" };
    }

    function moodAssessmentStatus(data, plan) {
      const source = plan && typeof plan === "object" ? plan : {};
      const stage = moodStageStatus(data.support_stage || source.support_stage);
      const aspects = moodAspectStatusLabels(
        data.current_aspects || source.current_aspects,
        data.current_aspect_labels || source.current_aspect_labels
      );
      const textParts = aspects.length ? [...aspects, stage.label] : ["情緒問答", stage.label];
      return {
        text: textParts.join("｜"),
        variant: stage.variant,
      };
    }

    function compactObject(value) {
      return Object.fromEntries(
        Object.entries(value).filter(([, item]) => item !== null && item !== undefined)
      );
    }

    function parseJsonObject(value) {
      try {
        const parsed = JSON.parse(value);
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch {
        return {};
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString("zh-TW", { hour12: false });
    }

    /* ===== Visualizer Orb ===== */
    let vizAnimFrame = null;
    let vizAudioCtx = null;
    let vizUserAnalyser = null;
    let vizRemoteAnalyser = null;
    let vizUserData = null;
    let vizRemoteData = null;

    function updateAssistantAudioGlow(level = 0, active = false) {
      if (!els.assistantAudioGlow) return;
      const normalized = Math.max(0, Math.min(1, level));
      els.assistantAudioGlow.style.setProperty("--glow-level", normalized.toFixed(3));
      els.assistantAudioGlow.style.setProperty("--glow-scale", (0.92 + normalized * 0.16).toFixed(3));
      els.assistantAudioGlow.classList.toggle("is-active", active || normalized > 0.015);
    }

    function startVisualizer() {
      stopVisualizer();

      // Try to set up audio analysers
      try {
        vizAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) { /* ignore */ }

      // Connect analysers when streams become available
      const tryConnectAnalysers = () => {
        if (vizAudioCtx && state.localStream && !vizUserAnalyser) {
          try {
            const src = vizAudioCtx.createMediaStreamSource(state.localStream);
            vizUserAnalyser = vizAudioCtx.createAnalyser();
            vizUserAnalyser.fftSize = 1024;
            vizUserAnalyser.smoothingTimeConstant = 0.86;
            src.connect(vizUserAnalyser);
            vizUserData = new Uint8Array(vizUserAnalyser.fftSize);
          } catch (e) { /* ignore */ }
        }
        if (vizAudioCtx && state.remoteStream && !vizRemoteAnalyser) {
          try {
            const src = vizAudioCtx.createMediaStreamSource(state.remoteStream);
            vizRemoteAnalyser = vizAudioCtx.createAnalyser();
            vizRemoteAnalyser.fftSize = 1024;
            vizRemoteAnalyser.smoothingTimeConstant = 0.88;
            src.connect(vizRemoteAnalyser);
            vizRemoteData = new Uint8Array(vizRemoteAnalyser.fftSize);
          } catch (e) { /* ignore */ }
        }
      };

      function getVolume(analyser, dataArray) {
        if (!analyser || !dataArray) return 0;
        analyser.getByteTimeDomainData(dataArray);
        let sum = 0;
        for (let i = 0; i < dataArray.length; i += 1) {
          const centered = (dataArray[i] - 128) / 128;
          sum += centered * centered;
        }
        return Math.min(1, Math.sqrt(sum / dataArray.length) * 2.6);
      }

      let assistantGlowSmoothed = 0;
      function draw() {
        tryConnectAnalysers();
        const userVol = getVolume(vizUserAnalyser, vizUserData);
        const remoteVol = getVolume(vizRemoteAnalyser, vizRemoteData);
        detectBargeIn(userVol, remoteVol);
        if (remoteVol > ASSISTANT_AUDIO_LEVEL_THRESHOLD) {
          setAssistantAudioActive(true);
          scheduleAssistantAudioRelease();
        }
        const vol = Math.max(userVol * 0.8, remoteVol * 1.5);
        const assistantGlowTarget = Math.min(1, 0.05 + remoteVol * 8.4);
        const glowEase = assistantGlowTarget > assistantGlowSmoothed ? 0.2 : 0.08;
        assistantGlowSmoothed += (assistantGlowTarget - assistantGlowSmoothed) * glowEase;
        updateAssistantAudioGlow(assistantGlowSmoothed, true);

        // Update stop button pulsing dots with sound volume
        const dotEls = document.querySelectorAll('#endSessionButton .pill-dots i');
        if (dotEls.length === 3) {
          dotEls[0].style.height = `${4 + vol * 16}px`;
          dotEls[1].style.height = `${4 + vol * 24}px`;
          dotEls[2].style.height = `${4 + vol * 16}px`;
        }

        vizAnimFrame = requestAnimationFrame(draw);
      }

      vizAnimFrame = requestAnimationFrame(draw);
    }

    function stopVisualizer() {
      if (vizAnimFrame) {
        cancelAnimationFrame(vizAnimFrame);
        vizAnimFrame = null;
      }
      vizUserAnalyser = null;
      vizRemoteAnalyser = null;
      vizUserData = null;
      vizRemoteData = null;
      updateAssistantAudioGlow(0, false);
      if (vizAudioCtx) {
        vizAudioCtx.close().catch(() => {});
        vizAudioCtx = null;
      }
    }

  </script>
